version: '3.8'

services:
  api:
    container_name: core
    build: ./core
    command: sh -c "sleep 10s; python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8081:8000"
    env_file:
      - ./.env
    volumes:
      - .:/usr/src/app
    networks:
      - sbm-network

networks:
  sbm-network:
    external: true
    name: sbm-db_sbm-network
